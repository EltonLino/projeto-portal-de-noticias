<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Portal de Notícias</title>
    <link rel="stylesheet" href="style/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="container">
      <nav id="primary" class="grid grid-flow-column">
        <div>
          <img src="assets/icons/List.svg" alt="Icone de menu" />
          <span>Menu</span>
        </div>
        <div>
          <img src="assets/logo-tech-news.svg" alt="Icone d0 logo" />
        </div>
        <div>
          <span>Buscar</span>
          <img
            src="assets/icons/MagnifyingGlass.svg"
            alt="Icone de Lupa de pesquisa"
          />
        </div>
      </nav>
      <nav id="secondary" class="grid grid-flow-column">
        <a href="#">Inteligência Artificial</a>
        <a href="#">Blockchain</a>
        <a href="#">Hologramas</a>
        <a href="#">Internet</a>
        <a href="#">Vestíveis</a>
        <a href="#">Realidade Aumentada</a>
        <a href="#">Realidade Virtual</a>
      </nav>
    </header>
    <main class="container grid">
      <section id="featured" class="grid grid-flow-column gap16">
        <div class="card">
          <img src="assets/images/Image 01.png" alt="" />
        </div>
        <div class="grid grid-columns-2 gap16">
          <div><img src="assets/images/Image 02.png" alt="" /></div>
          <div><img src="assets/images/Image 03.png" alt="" /></div>
          <div><img src="assets/images/Image 04.png" alt="" /></div>
          <div><img src="assets/images/Image 05.png" alt="" /></div>
        </div>
      </section>
    </main>
  </body>
</html>
